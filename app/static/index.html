<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #151522);
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        .chat-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 20px;
            box-shadow: 0 4px 12px rgba(167, 119, 227, 0.4);
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .header-subtitle {
            font-size: 0.875rem;
            color: #a0a0b0;
            margin-top: 4px;
        }

        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .message {
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border-bottom-left-radius: 4px;
            color: #e0e0e0;
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            border-bottom-right-radius: 4px;
            color: white;
            box-shadow: 0 8px 16px rgba(109, 142, 251, 0.2);
        }

        .chat-input-container {
            padding: 24px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-input-wrapper {
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 8px 8px 8px 20px;
            transition: all 0.2s ease;
        }

        .chat-input-wrapper:focus-within {
            border-color: #a777e3;
            background: rgba(255, 255, 255, 0.05);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }

        .chat-input::placeholder {
            color: #6c6c7c;
        }

        .send-btn {
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(167, 119, 227, 0.4);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
            margin-left: 2px;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            padding: 16px 20px;
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            gap: 4px;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #a0a0b0;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="header-avatar">AI</div>
            <div>
                <div class="header-title">Document Intelligence</div>
                <div class="header-subtitle">Ask questions about your data</div>
            </div>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="message bot">Hello! I've read your documents. What would you like to know?</div>
            
            <div class="typing-indicator" id="typing-indicator">
                <span></span><span></span><span></span>
            </div>
        </div>

        <div class="chat-input-container">
            <form id="chat-form" class="chat-input-wrapper">
                <input type="text" id="chat-input" class="chat-input" placeholder="Ask a question..." autocomplete="off">
                <button type="submit" class="send-btn">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        // Generate a random session ID for this user session
        const sessionId = "session_" + Math.random().toString(36).substr(2, 9);
        const form = document.getElementById('chat-form');
        const input = document.getElementById('chat-input');
        const messages = document.getElementById('chat-messages');
        const typingIndicator = document.getElementById('typing-indicator');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = input.value.trim();
            if (!message) return;

            // Add user message to UI
            appendMessage(message, 'user');
            input.value = '';

            // Show typing indicator
            typingIndicator.style.display = 'flex';
            messages.appendChild(typingIndicator); // move to bottom
            messages.scrollTop = messages.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: message
                    })
                });

                if (!response.ok) throw new Error("Network response was not ok");
                
                const data = await response.json();
                typingIndicator.style.display = 'none';
                appendMessage(data.response, 'bot');
            } catch (error) {
                console.error('Error:', error);
                typingIndicator.style.display = 'none';
                appendMessage("Sorry, I encountered an error while processing your request.", 'bot');
            }
        });

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.textContent = text;
            messages.insertBefore(div, typingIndicator);
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
